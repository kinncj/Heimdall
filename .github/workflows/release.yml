name: release

# Mirrors the MAPLE release flow: the maintainer publishes a GitHub Release
# (which creates the tag + notes), and this workflow cross-compiles the binaries
# and attaches them. CI never creates the release, so re-runs are idempotent and
# never collide with an existing tag.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Cross-compile and attach binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      # scripts/release.sh is the single source of build truth (also `make
      # release` locally): all four binaries, every platform, CGO-free, into
      # dist/ with a SHA256SUMS manifest.
      - name: Build release artifacts
        run: bash scripts/release.sh
        env:
          VERSION: ${{ github.ref_name }}

      - name: Attach binaries to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/heimdall-*
            dist/SHA256SUMS
